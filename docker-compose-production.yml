services:
  web-site:
    container_name: mbl1-site
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${SITE_PORT}
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=srv_default'

      - 'traefik.http.routers.mbl1_site.rule=Host(`dev.mbl1.by`)'
      - 'traefik.http.routers.mbl1_site.entrypoints=websecure'
      - 'traefik.http.routers.mbl1_site.tls.certresolver=letsencrypt'

      - 'traefik.http.services.mbl1_site.loadbalancer.server.port=${SITE_PORT}'

      - 'traefik.http.middlewares.mbl1_auth.basicauth.users=user:$$apr1$$0uUP0X6r$$.ADas4BH3jSlUM3BYUqQ2.'
      - 'traefik.http.routers.mbl1_site.middlewares=mbl1_auth'
    networks:
      - internal
      - srv_default

  directus:
    container_name: mbl1-directus
    image: directus/directus:latest
    restart: unless-stopped
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}

      CORS_ENABLED: 'true'
      CORS_ORIGIN: '*'
      CORS_METHODS: 'GET,POST,PATCH,DELETE,OPTIONS'
      CORS_HEADERS: 'Content-Type,Authorization'

      CACHE_ENABLED: 'true'
      CACHE_STORE: redis
      REDIS: redis://redis:6379

      CACHE_TTL: 5m
      CACHE_AUTO_PURGE: 'true'
      CACHE_AUTO_PURGE_IGNORE_LIST: 'logs,sessions'
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/directus/uploads
      - ./backend/extensions:/directus/extensions
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=srv_default'

      - 'traefik.http.routers.mbl1_cms.rule=Host(`api.mbl1.by`)'
      - 'traefik.http.routers.mbl1_cms.entrypoints=websecure'
      - 'traefik.http.routers.mbl1_cms.tls.certresolver=letsencrypt'

      - 'traefik.http.services.mbl1_cms.loadbalancer.server.port=8055'
    networks:
      srv_default:
        aliases:
          - mbl1_cms
      internal: {}

  postgres:
    container_name: mbl1-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./backend/db_data:/var/lib/postgresql/data
      - ./backend/backups:/var/lib/postgresql/backups
      - ./backend/initial:/docker-entrypoint-initdb.d/
    networks:
      - internal

  redis:
    container_name: mbl1-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./backend/redis_data:/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

  srv_default:
    external: true
